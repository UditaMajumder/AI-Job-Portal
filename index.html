<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Job Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="home-page">
    
    <!-- NAVBAR -->
    <nav class="navbar">
    <div class="logo">
        <span class="logo-main">Next</span>
        <span class="logo-sub">Hire</span>
    </div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="jobs.html">Jobs</a></li>
        <li><a href="login.html" class="btn-outline">Login</a></li>
        <li><a href="signup.html" class="btn-filled" style=" background-color:#8fa1ff;">Signup</a></li>
         
    </ul>
</nav>   
    <!-- HERO -->
    <section class="hero-container">
        <div class="hero-left">
            <h1>
    Find Your Dream <br>
    <span style="color:orange;">Tech Job</span>
</h1>
<p>Discover jobs across development, data, AI, and more — tailored for you.</p>
            <button class="get-started-btn" onclick="openModal()">Get Started</button>
        </div>

        <div class="hero-right">
            <img src="jobPic1.jpeg" alt="image">
        </div>
    </section>

    <!-- MODAL -->
    <div class="overlay" id="modal">
    <div class="login-modal">
        <span class="close-btn" onclick="closeModal()">✖</span>

        <h2>LOGIN OR SIGN UP TO START LEARNING</h2>

        <form id="login-form">
            <input type="email" placeholder="E-mail" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="links">
            <a href="signup.html">Create Account</a>
            <a href="#">Forgot password?</a>
        </div>
    </div>
</div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
