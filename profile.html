<!DOCTYPE html>
<html lang="en">
<head>
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">

    <!-- LOGO (LEFT) -->
    <div class="logo">
        <span class="logo-main">Next</span>
        <span class="logo-sub">Hire</span>
    </div>

    <!-- NAV LINKS (RIGHT) -->
    <ul class="nav-links">
        <li><a href="jobs.html">Jobs</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
    </ul>

</nav>

<section class="profile-container">

    <div class="profile-card">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="profile-avatar">

        <h2>Your Profile</h2>

        <form id="profile-form">
            <div class="input-group">
                <span>💻</span>
                <input type="text" placeholder="Skills" required>
            </div>

            <div class="input-group">
                <span>📈</span>
                <input type="text" placeholder="Experience" required>
            </div>

            <div class="input-group">
                <span>📍</span>
                <input type="text" placeholder="Location" required>
            </div>

            <button type="submit">Save</button>
        </form>
    </div>

</section>
<script src="script.js"></script>

</body>
</html>
